<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Tektur&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="index.css">
  <script src="index.js"></script>
  <title>Equipment Testing</title>
</head>
<body app-theme="light">
  <header id="et-app-header">
    <span id="et-app-name">Equipment Testing</span>
    <div id="et-app-header__right-block">
      <div class="user-info">
        <img src="./images/chill_guy.jpg" alt="User avatar" class="user-info__avatar" />
        <span class="user-info__username">Chill Guy</span>
      </div>
    </div>
  </header>
  <main id="et-app-base">
    <ul class="employees-list">
      <li class="employee">
        <button id="add-employee-btn">
          Добавить сотрудника
        </button>
        <input
          type="text"
          id="add-employee-input"
          placeholder="ФИО сотрудника"
        />
      </li>
    </ul>
  </main>
</body>
</html>
